services:
  - type: web
    name: dimitrios-portfolio-rag
    runtime: python
    plan: free
    rootDir: rag-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: ALLOWED_ORIGINS
        value: https://dimitriosmarkoulis.github.io,http://localhost:5500,http://127.0.0.1:5500
      - key: INDEX_PATH
        value: data/project_vector_index.json
      - key: GITHUB_TOKEN
        sync: false
